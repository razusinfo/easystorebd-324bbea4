name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate .cpanel.yml syntax
        run: |
          test -f .cpanel.yml || { echo "::error::.cpanel.yml missing"; exit 1; }
          python3 -c "import yaml,sys; d=yaml.safe_load(open('.cpanel.yml')); assert 'deployment' in d and 'tasks' in d['deployment'], 'invalid .cpanel.yml structure'; print('.cpanel.yml OK')"


      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build (dev)
        run: bun run build:dev

      - name: Build (prod)
        run: bun run build

      - name: Test (includes client-bundle guard)
        run: bun run test
