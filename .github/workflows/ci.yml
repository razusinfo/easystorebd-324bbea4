name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate .cpanel.yml syntax
        run: |
          test -f .cpanel.yml || { echo "::error::.cpanel.yml missing"; exit 1; }
          python3 -c "import yaml,sys; d=yaml.safe_load(open('.cpanel.yml')); assert 'deployment' in d and 'tasks' in d['deployment'], 'invalid .cpanel.yml structure'; print('.cpanel.yml OK')"


      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check Node/npm versions
        run: node -v && npm -v

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Validate node_modules is writable
        run: mkdir -p node_modules && test -w node_modules

      - name: Install dependencies (npm ci)
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund --legacy-peer-deps
          else
            npm install --no-audit --no-fund --legacy-peer-deps
          fi

      - name: Lint
        run: bun run lint

      - name: Build (dev)
        run: bun run build:dev

      - name: Build (prod)
        run: bun run build

      - name: Test (includes client-bundle guard)
        run: bun run test
